<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Episode Downloader</title>
    <!-- Hardcoded security policy -->
    <meta name="referrer" content="no-referrer">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0c0a09;
            --card-bg: rgba(28, 25, 23, 0.6);
            --card-border: rgba(120, 113, 108, 0.2);
            --accent-green: #10b981;
            --accent-glow: rgba(16, 185, 129, 0.4);
            --text-main: #f5f5f4;
            --text-muted: #a8a29e;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            background-image: 
                radial-gradient(at 0% 0%, rgba(16, 185, 129, 0.08) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(16, 185, 129, 0.05) 0px, transparent 50%);
            color: var(--text-main);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        .container {
            width: 90%;
            max-width: 480px;
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            border: 1px solid var(--card-border);
            border-radius: 16px;
            padding: 40px 30px;
            box-shadow: 0 10px 30px -10px rgba(0, 0, 0, 0.5);
            text-align: center;
            animation: fadeIn 0.6s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h1 {
            font-family: 'Outfit', sans-serif;
            font-weight: 800;
            font-size: 28px;
            margin: 0 0 10px 0;
            background: linear-gradient(135deg, #ffffff 30%, #10b981 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .subtitle {
            font-size: 14px;
            color: var(--text-muted);
            margin-bottom: 30px;
        }

        .file-card {
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.03);
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 30px;
            word-break: break-word;
        }

        .file-icon {
            font-size: 40px;
            margin-bottom: 15px;
            display: block;
        }

        .file-name {
            font-weight: 600;
            font-size: 16px;
            line-height: 1.4;
            color: var(--text-main);
        }

        .download-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            padding: 16px 20px;
            background-color: var(--accent-green);
            color: #0c0a09;
            font-family: 'Outfit', sans-serif;
            font-weight: 700;
            font-size: 16px;
            text-decoration: none;
            border-radius: 8px;
            box-shadow: 0 4px 20px var(--accent-glow);
            transition: all 0.3s ease;
            cursor: pointer;
            box-sizing: border-box;
        }

        .download-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 24px rgba(16, 185, 129, 0.6);
            background-color: #34d399;
        }

        .download-btn:active {
            transform: translateY(1px);
        }

        .footer {
            font-size: 12px;
            color: #57534e;
            margin-top: 25px;
        }
    </style>
</head>
<body>
    <div class="container">
        <span class="file-icon">🎬</span>
        <h1 id="header-title">File Ready</h1>
        <div class="subtitle">Secure Referrer-Bypass Tunnel</div>

        <div class="file-card">
            <div id="file-title" class="file-name">Loading file details...</div>
        </div>

        <a id="download-btn" href="#" rel="noreferrer" referrerpolicy="no-referrer" class="download-btn">
            Download Episode
        </a>

        <div class="footer">
            Referrer protection is active. Securely hosted on GitHub Pages.
        </div>
    </div>

    <script>
        // Extract the target URL from the query parameter (?url=...)
        const urlParams = new URLSearchParams(window.location.search);
        const target = urlParams.get('url');

        if (target) {
            // Extract filename from the Pixeldrain URL
            const parts = target.split('/');
            let filename = parts[parts.length - 1];
            
            // Clean up the filename for display
            if (filename) {
                filename = decodeURIComponent(filename);
                let cleanName = filename.replace(/\.Vegamovies\.to/i, '')
                                        .replace(/\.mkv$/i, '')
                                        .replace(/\./g, ' ');
                
                document.getElementById('file-title').textContent = cleanName;
                document.getElementById('header-title').textContent = "Episode Ready";
            }
            
            // Bind the download URL to the button and append a cache-buster (?t=timestamp)
            const downloadBtn = document.getElementById('download-btn');
            downloadBtn.href = target + "?t=" + Date.now();
        } else {
            document.getElementById('file-title').textContent = "Error: No valid download URL provided.";
            document.getElementById('download-btn').style.display = "none";
        }
    </script>
</body>
</html>
